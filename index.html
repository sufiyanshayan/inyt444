<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  font-family:"Noto Serif Bengali",serif;
  background:#f7f7f7;
  overflow-x:hidden;
}

.wrapper{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:10px 0;
}

.container{
  width:100%;
  max-width:360px; /* কমানো হয়েছে */
  padding:12px;
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:6px; /* কম gap */
}

/* Profile */
.profile img{
  width:85px; /* ছোট করা হয়েছে */
  height:85px;
  border-radius:50%;
  border:2px solid #000;
  object-fit:cover;
  margin-bottom:8px;
  box-shadow:0 0 0 4px #fff,0 0 10px rgba(0,0,0,0.25);
}

/* Name */
.name{
  font-size:16px; /* ছোট */
  font-weight:700;
  margin-bottom:2px;
}

.title{
  font-size:11px;
  color:#555;
  margin-bottom:10px;
}

/* Buttons */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:8px; /* height কমানো */
  border-radius:14px;
  text-decoration:none;
  background:#ffffff;
  color:#000;
  font-size:12px; /* ছোট */
  font-weight:500;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  transition:0.2s;
}

.btn img{
  width:14px;
  height:14px;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 14px rgba(0,0,0,0.12);
}

/* Footer */
.footer{
  margin-top:12px;
  font-size:10px; /* ছোট */
  color:#555;
  text-align:center;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="container">

    <div class="profile">
      <img src="Your_Profile_Picture_Link" alt="Profile Picture">
    </div>

    <div class="name">Your_Name</div>
    <div class="title">Your_Title</div>

    <!-- Buttons -->
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/facebook/000000">Facebook</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/facebook/000000">Facebook Page</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/instagram/000000">Instagram</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/whatsapp/000000">WhatsApp</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/tiktok/000000">TikTok</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/telegram/000000">Telegram</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/x/000000">Twitter (X)</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/discord/000000">Discord</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/phone/000000">Call Me</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/aboutdotme/000000">About Me</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/googlechrome/000000">My Website</a>

  </div>

  <div class="footer">
    Copyright © 2026 MADE BY <br>
    "Your_Name".<br>
    All Rights Reserved.
  </div>

</div>

</body>
</html>
