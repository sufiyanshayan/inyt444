<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: "Noto Serif Bengali", serif;
  background: #f4f4f4;
  overflow-x: hidden;
}

.wrapper {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 380px;
  padding: 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* Profile */
.profile img {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  border: 2px solid #000;
  object-fit: cover;
  margin-bottom: 10px;
  box-shadow: 0 0 0 4px #fff, 0 0 10px rgba(0,0,0,0.25);
}

/* Name */
.name {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 2px;
}

/* Title */
.title {
  font-size: 11px;
  color: #666;
  margin-bottom: 12px;
}

/* Buttons - Small & Stable */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px;
  border-radius: 10px;
  text-decoration: none;
  background: #ffffff;
  color: #000;
  font-size: 12px;
  font-weight: 500;
  box-shadow: 0 3px 8px rgba(0,0,0,0.06);
}

.btn img {
  width: 14px;
  height: 14px;
}

/* Footer */
.footer {
  margin-top: 18px;
  font-size: 11px;
  color: #666;
  text-align: center;
  padding-bottom: 10px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="container">

    <div class="profile">
      <img src="Your_Profile_Picture_Link" alt="Profile Picture">
    </div>

    <div class="name">Your_Name</div>
    <div class="title">Your_Title</div>

    <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
      <img src="https://cdn.simpleicons.org/facebook/000000" alt="Facebook">
      Facebook
    </a>

    <a class="btn" href="https://www.facebook.com/your_page" target="_blank">
      <img src="https://cdn.simpleicons.org/facebook/000000" alt="Facebook Page">
      Facebook Page
    </a>

    <a class="btn" href="https://www.instagram.com/your_username" target="_blank">
      <img src="https://cdn.simpleicons.org/instagram/000000" alt="Instagram">
      Instagram
    </a>

    <a class="btn" href="https://wa.me/8801234567890" target="_blank">
      <img src="https://cdn.simpleicons.org/whatsapp/000000" alt="WhatsApp">
      WhatsApp
    </a>

    <a class="btn" href="https://t.me/your_username" target="_blank">
      <img src="https://cdn.simpleicons.org/telegram/000000" alt="Telegram">
      Telegram
    </a>

    <a class="btn" href="https://x.com/your_username" target="_blank">
      <img src="https://cdn.simpleicons.org/x/000000" alt="X">
      Twitter (X)
    </a>

    <a class="btn" href="tel:01234567890">
      <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" alt="Call">
      Call Me
    </a>

  </div>

  <div class="footer">
    © 2026 MADE BY <br> "Your_Name" <br> All Rights Reserved.
  </div>

</div>

</body>
</html>
