<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
/* Reset & Base */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f0f2f5, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Card Container */
.card {
  background: #fff;
  border-radius: 24px;
  padding: 32px 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

/* Profile */
.profile img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #fff;
  object-fit: cover;
  box-shadow: 0 0 0 6px #f0f2f5, 0 10px 25px rgba(0,0,0,0.12);
}

/* Name & Title */
.name {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: #111;
}

.title {
  font-size: 14px;
  color: #777;
  letter-spacing: 0.5px;
}

/* Buttons */
.btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 12px 0;
  border-radius: 16px;
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
  background: #f7f7f7;
  color: #111;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  transition: all 0.3s ease;
}

.btn img {
  width: 20px;
  height: 20px;
}

.btn:hover {
  background: linear-gradient(90deg, #6a11cb, #2575fc);
  color: #fff;
  box-shadow: 0 10px 25px rgba(0,0,0,0.12);
  transform: translateY(-2px);
}

/* Footer */
.footer {
  margin-top: 24px;
  font-size: 12px;
  color: #999;
  text-align: center;
  line-height: 1.5;
}

/* Responsive */
@media(max-width: 400px){
  .card { padding: 28px 16px; }
  .name { font-size: 22px; }
  .title { font-size: 13px; }
  .btn { font-size: 13px; padding: 10px 0; }
}
</style>
</head>

<body>

<div class="card">

  <div class="profile">
    <img src="Your_Profile_Picture_Link" alt="Profile Picture">
  </div>

  <div class="name">Your_Name</div>
  <div class="title">Your_Title</div>

  <a class="btn" href="https://www.facebook.com/your_username" target="_blank" rel="noopener noreferrer">
    <img src="https://cdn.simpleicons.org/facebook/ffffff" alt="Facebook Logo">Facebook
  </a>

  <a class="btn" href="https://www.instagram.com/your_username" target="_blank" rel="noopener noreferrer">
    <img src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram Logo">Instagram
  </a>

  <a class="btn" href="https://wa.me/8801234567890" target="_blank" rel="noopener noreferrer">
    <img src="https://cdn.simpleicons.org/whatsapp/ffffff" alt="WhatsApp Logo">WhatsApp
  </a>

  <a class="btn" href="https://t.me/your_username" target="_blank" rel="noopener noreferrer">
    <img src="https://cdn.simpleicons.org/telegram/ffffff" alt="Telegram Logo">Telegram
  </a>

  <a class="btn" href="https://x.com/your_username" target="_blank" rel="noopener noreferrer">
    <img src="https://cdn.simpleicons.org/x/ffffff" alt="X Logo">Twitter (X)
  </a>

  <a class="btn" href="tel:01234567890">
    <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" alt="Phone Logo">Call Me
  </a>

</div>

<div class="footer">
  © 2026 MADE BY <br> "Your_Name". <br> All Rights Reserved.
</div>

</body>
</html>
