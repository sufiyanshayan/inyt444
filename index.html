<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:"Noto Serif Bengali",serif;
  background:#f7f7f7;
  display:flex;
  justify-content:center;
}

.wrapper{
  width:100%;
  max-width:360px;
  padding:14px 12px;
  text-align:center;
}

/* Profile */
.profile{
  width:85px;
  height:85px;
  margin:0 auto 8px auto;
  border-radius:50%;
  overflow:hidden;
  border:2px solid #000;
  box-shadow:0 0 0 4px #fff,0 0 10px rgba(0,0,0,0.25);
}

.profile img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.name{
  font-size:16px;
  font-weight:700;
}

.title{
  font-size:11px;
  color:#666;
  margin-bottom:10px;
}

/* Buttons */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:8px;
  border-radius:16px;
  text-decoration:none;
  background:#ffffff;
  color:#000;
  font-size:12px;
  margin:6px 0;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  transition:0.2s;
}

.btn img{
  width:15px;
  height:15px;
  filter: brightness(0); /* icon কালো */
}

.btn:hover{
  transform:translateY(-2px);
}

/* Footer */
.footer{
  margin-top:12px;
  font-size:10px;
  color:#555;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="profile">
  <img src="Your_Profile_Picture_Link" alt="Profile">
</div>

<div class="name">Your_Name</div>
<div class="title">Your_Title</div>

<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg">Facebook</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg">Facebook Page</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg">Instagram</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/whatsapp.svg">WhatsApp</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/tiktok.svg">TikTok</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/telegram.svg">Telegram</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/x.svg">Twitter (X)</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/discord.svg">Discord</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/phone.svg">Call Me</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/aboutdotme.svg">About Me</a>
<a class="btn" href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/googlechrome.svg">My Website</a>

<div class="footer">
Copyright © 2026 MADE BY <br>
"Your_Name".<br>
All Rights Reserved.
</div>

</div>

</body>
</html>
