<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
/* Reset */
* { margin:0; padding:0; box-sizing:border-box; }

/* Body */
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #e0f7fa, #fce4ec);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* Glassmorphism Card */
.card {
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(15px);
  border-radius: 28px;
  padding: 32px 24px;
  width: 100%;
  max-width: 400px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.08);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.12);
}

/* Profile */
.profile img {
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(255,255,255,0.5);
  box-shadow:0 0 0 6px rgba(255,255,255,0.2),0 10px 25px rgba(0,0,0,0.12);
}

/* Name & Title */
.name {
  font-family:'Playfair Display', serif;
  font-size:24px;
  font-weight:700;
  color:#111;
}

.title {
  font-size:14px;
  color:#555;
  letter-spacing:0.5px;
}

/* Buttons */
.btn {
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  padding:12px 0;
  border-radius:18px;
  text-decoration:none;
  font-weight:500;
  font-size:14px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color:#fff;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  transition: all 0.3s ease;
}

.btn img {
  width:20px;
  height:20px;
  filter: brightness(0) invert(1);
}

.btn:hover {
  filter: brightness(1.1);
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

/* Footer */
.footer {
  margin-top:24px;
  font-size:12px;
  color:#555;
  text-align:center;
  line-height:1.5;
}

/* Responsive */
@media(max-width:420px){
  .card{padding:28px 16px;}
  .name{font-size:22px;}
  .title{font-size:13px;}
  .btn{font-size:13px;padding:10px 0;}
}
</style>
</head>

<body>

<div class="card">

  <div class="profile">
    <img src="Your_Profile_Picture_Link" alt="Profile Picture">
  </div>

  <div class="name">Your_Name</div>
  <div class="title">Your_Title</div>

  <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg" alt="Facebook Logo">Facebook
  </a>

  <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg" alt="Facebook Page Logo">Facebook Page
  </a>

  <a class="btn" href="https://www.instagram.com/your_username" target="_blank">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram Logo">Instagram
  </a>

  <a class="btn" href="https://wa.me/8801234567890" target="_blank">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/whatsapp.svg" alt="WhatsApp Logo">WhatsApp
  </a>

  <a class="btn" href="https://www.tiktok.com/@your_username" target="_blank">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/tiktok.svg" alt="TikTok Logo">TikTok
  </a>

  <a class="btn" href="https://t.me/your_username" target="_blank">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/telegram.svg" alt="Telegram Logo">Telegram
  </a>

  <a class="btn" href="https://x.com/your_username" target="_blank">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/x.svg" alt="X Logo">Twitter (X)
  </a>

  <a class="btn" href="https://discord.gg/your_invite_link" target="_blank">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/discord.svg" alt="Discord Logo">Discord
  </a>

  <a class="btn" href="tel:01234567890">
    <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" alt="Phone Logo">Call Me
  </a>

  <a class="btn" href="#" target="_blank">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/aboutdotme.svg" alt="About Logo">About Me
  </a>

  <a class="btn" href="#" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" alt="Website Logo">My Website
  </a>

</div>

<div class="footer">
  © 2026 MADE BY <br> "Your_Name". <br> All Rights Reserved.
</div>

</body>
</html>
