<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Blank Website</title>
  <style>
    /* CSS এখানে লিখবেন */
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      padding: 20px;
    }
    #app {
      padding: 10px;
      border: 1px solid #ccc;
      background: #fff;
    }
  </style>
</head>
<body>

<div id="app">
  <!-- আপনার HTML content এখানে লিখুন -->
</div>

<script>
  // JavaScript code এখানে লিখুন
  const app = document.getElementById("app");

  // Example: HTML show করা
  app.innerHTML = "<h1></h1><p></p>";

  // Example: JS run করা
  console.log("JS is running!");
</script>

</body>
</html>
