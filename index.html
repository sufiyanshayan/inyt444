<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  height:100vh;
  overflow:hidden; /* 🔥 slide বন্ধ */
  font-family:"Noto Serif Bengali",serif;
  background:#f7f7f7;
}

.wrapper{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:340px;
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:5px;
}

/* Profile */
.profile img{
  width:75px;
  height:75px;
  border-radius:50%;
  border:2px solid #000;
  object-fit:cover;
  margin:0 auto 6px auto;
}

/* Name */
.name{
  font-size:15px;
  font-weight:700;
}

.title{
  font-size:10px;
  color:#555;
  margin-bottom:6px;
}

/* Buttons */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:7px;
  border-radius:14px;
  text-decoration:none;
  background:#ffffff;
  color:#000;
  font-size:11px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  transition:0.2s;
}

.btn img{
  width:15px;
  height:15px;
}

.btn:hover{
  transform:translateY(-2px);
}

/* Footer */
.footer{
  margin-top:6px;
  font-size:9px;
  color:#555;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="profile">
  <img src="Your_Profile_Picture_Link" alt="Profile">
</div>

<div class="name">Your_Name</div>
<div class="title">Your_Title</div>

<a class="btn" href="#"><img src="https://cdn.simpleicons.org/facebook/000000">Facebook</a>
<a class="btn" href="#"><img src="https://cdn.simpleicons.org/facebook/000000">Facebook Page</a>
<a class="btn" href="#"><img src="https://cdn.simpleicons.org/instagram/000000">Instagram</a>
<a class="btn" href="#"><img src="https://cdn.simpleicons.org/whatsapp/000000">WhatsApp</a>
<a class="btn" href="#"><img src="https://cdn.simpleicons.org/tiktok/000000">TikTok</a>
<a class="btn" href="#"><img src="https://cdn.simpleicons.org/telegram/000000">Telegram</a>
<a class="btn" href="#"><img src="https://cdn.simpleicons.org/x/000000">Twitter (X)</a>
<a class="btn" href="#"><img src="https://cdn.simpleicons.org/discord/000000">Discord</a>

<!-- Fixed Icons -->
<a class="btn" href="tel:01XXXXXXXXX">
  <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png">
  Call Me
</a>

<a class="btn" href="#" >
  <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png">
  My Website
</a>

<div class="footer">
Copyright © 2026 MADE BY <br>
"Your_Name".<br>
All Rights Reserved.
</div>

</div>
</div>

</body>
</html>
