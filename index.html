<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Launching Soon | INYT 444</title>
    <link rel="icon" href="https://i.postimg.cc/7ZsCGC17/451236214-995219779013572-5086974055196939289-n-(1).jpg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(145deg, #0a0a0f, #1a1a2e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,50,100,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(80,200,255,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, rgba(200,100,255,0.15) 0%, transparent 50%),
                        linear-gradient(145deg, #0a0a0f, #1a1a2e);
            z-index: -2;
            animation: breathe 10s ease-in-out infinite;
        }
        @keyframes breathe { 0%,100%{opacity:0.8;} 50%{opacity:1;} }
        .particle {
            position: fixed;
            width: 3px; height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: float 20s linear infinite;
        }
        @keyframes float {
            from { transform: translateY(100vh) translateX(0); }
            to { transform: translateY(-100vh) translateX(100px); }
        }
        .container { max-width: 550px; width: 90%; margin: 2rem auto; position: relative; z-index: 2; }
        .launch-card {
            background: rgba(30,30,44,0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,100,255,0.3);
            border-radius: 48px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,100,255,0.2) inset, 0 0 50px rgba(255,100,255,0.2);
            animation: fadeIn 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }
        .launch-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,100,255,0.05), rgba(100,200,255,0.05), rgba(255,100,200,0.05), transparent 70%);
            animation: rotate 12s linear infinite;
            pointer-events: none;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .logo-container { display: flex; justify-content: center; margin-bottom: 1.5rem; }
        .logo-wrapper {
            width: 120px; height: 120px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff50a0, #a050ff);
            box-shadow: 0 0 30px rgba(255,100,255,0.5);
            animation: floatIcon 3s ease-in-out infinite;
        }
        @keyframes floatIcon { 0%,100%{transform:translateY(0px);} 50%{transform:translateY(-8px);} }
        .logo-img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
        .fallback-logo { font-size: 4rem; color: white; filter: drop-shadow(0 0 20px rgba(255,255,255,0.5)); }
        h1 {
            font-size: 2.2rem; font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffa0ff, #a0ffff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; }
        .launch-date-box {
            background: transparent; border: 1px solid rgba(255,100,255,0.4);
            border-radius: 80px; padding: 0.8rem 1.5rem;
            display: inline-block; margin: 1.5rem 0;
        }
        .date-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: #ffa0ff; font-weight: 600; }
        .big-date { font-size: 1.2rem; font-weight: 600; margin-top: 0.2rem; color: #fff; text-shadow: 0 0 10px rgba(255,160,255,0.3); }
        .countdown { display: flex; justify-content: center; gap: 1rem; margin: 2rem 0; flex-wrap: wrap; }
        .time-box {
            background: rgba(10,10,18,0.6); backdrop-filter: blur(4px);
            border-radius: 24px; padding: 1rem 0.8rem; min-width: 85px;
            border: 1px solid rgba(255,100,255,0.3); box-shadow: 0 0 20px rgba(255,100,255,0.1);
        }
        .time-number {
            font-size: 2.2rem; font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffa0ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1; font-family: 'Space Grotesk', monospace;
        }
        .time-label { font-size: 0.7rem; text-transform: uppercase; color: rgba(200,200,255,0.7); letter-spacing: 2px; margin-top: 0.4rem; }
        .status { margin-top: 1rem; font-size: 0.8rem; color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status i { color: #ffa0ff; }
        .cyber-footer { font-size: 0.65rem; color: rgba(200,200,255,0.3); margin-top: 2rem; text-align: center; letter-spacing: 2px; text-transform: uppercase; }
        hr { width: 60px; margin: 1rem auto; border: none; height: 1px; background: linear-gradient(90deg, transparent, #ffa0ff, transparent); }
        .live-message { background: linear-gradient(135deg, #ff50a0, #a050ff); padding: 15px 25px; border-radius: 60px; color: white; font-weight: 700; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="container">
        <div class="launch-card">
            <div class="logo-container">
                <div class="logo-wrapper">
                    <div id="logoDisplay"><i class="fa-regular fa-crystal fallback-logo"></i></div>
                </div>
            </div>
            <h1>INYT 444</h1>
            <div class="subtitle">COMING SOON</div>
            <div class="launch-date-box">
                <div class="date-label">OFFICIAL LAUNCH</div>
                <div class="big-date" id="displayDate"></div>
            </div>
            <div id="countdownContainer">
                <div class="countdown" id="countdown">
                    <div class="time-box"><div class="time-number" id="days">00</div><div class="time-label">DAYS</div></div>
                    <div class="time-box"><div class="time-number" id="hours">00</div><div class="time-label">HOURS</div></div>
                    <div class="time-box"><div class="time-number" id="minutes">00</div><div class="time-label">MINUTES</div></div>
                    <div class="time-box"><div class="time-number" id="seconds">00</div><div class="time-label">SECONDS</div></div>
                </div>
            </div>
            <div class="status"><i class="fa-regular fa-clock"></i> <span id="liveStatus">COUNTDOWN TO LAUNCH</span></div>
            <hr>
            <div class="cyber-footer"> READY FOR TAKEOFF</div>
        </div>
    </div>

    <script>
        // ========================================
        // ⭐ শুধু এখানে তারিখ ও সময় লিখুন ⭐
        // Format: "DD/MM/YYYY HH:MM:SS"
        // ========================================
        
        const launchDateString = "1/05/2026 00:00:00";
        
        // উদাহরণ:
        // "25/12/2026 20:30:00" = 25 ডিসেম্বর 2026, রাত 8:30 PM
        // "15/08/2025 10:00:00" = 15 আগস্ট 2025, সকাল 10:00 AM
        
        // ========================================
        
        // Parse function (DD/MM/YYYY HH:MM:SS)
        function parseDate(dateString) {
            const [datePart, timePart] = dateString.split(' ');
            const [day, month, year] = datePart.split('/');
            const [hours, minutes, seconds] = timePart.split(':');
            return new Date(year, month - 1, day, hours, minutes, seconds);
        }
        
        const launchDate = parseDate(launchDateString);
        
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        
        function format12HourTime(date) {
            let hours = date.getHours();
            const minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            const minuteStr = minutes < 10 ? '0' + minutes : minutes;
            return `${hours}:${minuteStr} ${ampm}`;
        }
        
        function formatDisplayDate(date) {
            const dayName = dayNames[date.getDay()];
            const monthName = monthNames[date.getMonth()];
            const day = date.getDate();
            const year = date.getFullYear();
            const timeStr = format12HourTime(date);
            return `${dayName}, ${monthName} ${day}, ${year} — ${timeStr}`;
        }
        
        document.getElementById('displayDate').innerText = formatDisplayDate(launchDate);
        
        // Logo
        const logoImageUrl = "https://i.postimg.cc/7ZsCGC17/451236214-995219779013572-5086974055196939289-n-(1).jpg";
        function displayLogo() {
            const logoDisplay = document.getElementById('logoDisplay');
            if (logoImageUrl && logoImageUrl !== "YOUR_LOGO_LINK" && logoImageUrl !== "") {
                logoDisplay.innerHTML = `<img src="${logoImageUrl}" class="logo-img" alt="Logo" onerror="this.parentElement.innerHTML = '<i class=\'fa-regular fa-crystal fallback-logo\'></i>'">`;
            }
        }
        displayLogo();
        
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate.getTime() - now;
            if (distance < 0) {
                document.getElementById('countdownContainer').innerHTML = `<div class="live-message">🚀 WE ARE LIVE! 🚀</div>`;
                document.getElementById('liveStatus').innerHTML = 'website launched successfully';
                return;
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById('days').innerText = days < 10 ? '0' + days : days;
            document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
            document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);
        
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (10 + Math.random() * 20) + 's';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.width = (Math.random() * 4 + 2) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = `hsl(${Math.random() * 60 + 280}, 100%, 65%)`;
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
