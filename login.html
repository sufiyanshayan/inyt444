<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Space Grotesk', sans-serif;
  background: linear-gradient(145deg, #0a0a0f, #1a1a2e);
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* Background Glow */
.cyber-bg{
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 50%, rgba(255, 50, 100, 0.15), transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(80, 200, 255, 0.15), transparent 50%),
    radial-gradient(circle at 40% 20%, rgba(200, 100, 255, 0.15), transparent 50%);
  z-index:-1;
}

/* Card */
.login-box{
  width:90%;
  max-width:350px;
  padding:2rem;
  border-radius:25px;
  background: rgba(20,20,35,0.7);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,100,200,0.2);
  box-shadow: 0 0 40px rgba(255,100,255,0.2);
  text-align:center;
}

/* Title */
.login-box h2{
  margin-bottom:1.5rem;
  font-weight:700;
  background: linear-gradient(135deg, #fff, #ffa0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Inputs */
.input-group{
  margin-bottom:1rem;
}

.input-group input{
  width:100%;
  padding:0.8rem 1rem;
  border-radius:50px;
  border:1px solid rgba(255,255,255,0.1);
  background: rgba(30,30,45,0.7);
  color:white;
  outline:none;
  font-size:0.9rem;
  transition:0.3s;
}

.input-group input:focus{
  border-color:#ffa0ff;
  box-shadow:0 0 10px rgba(255,100,255,0.3);
}

/* Button */
.login-btn{
  width:100%;
  padding:0.8rem;
  border:none;
  border-radius:50px;
  background: linear-gradient(135deg, #ff50a0, #a050ff);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.login-btn:hover{
  transform: translateY(-2px);
  box-shadow:0 5px 20px rgba(255,100,255,0.4);
}

/* Error */
.error{
  margin-top:0.8rem;
  font-size:0.8rem;
  color:#ff6b6b;
  display:none;
}
</style>
</head>

<body>

<div class="cyber-bg"></div>

<div class="login-box">
  <h2>🔐 Login</h2>

  <div class="input-group">
    <input type="text" id="username" placeholder="Username">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
  </div>

  <button class="login-btn" onclick="login()">Login</button>

  <div class="error" id="error">Wrong username or password</div>
</div>

<script>
const USER = {
  username: "admin",
  password: "12345"
};

function login(){
  let u = document.getElementById('username').value;
  let p = document.getElementById('password').value;

  if(u === USER.username && p === USER.password){
    localStorage.setItem("auth", "true");
    window.location.href = "index.html"; // তোমার main page
  } else {
    document.getElementById('error').style.display = "block";
  }
}

/* Already logged in */
if(localStorage.getItem("auth") === "true"){
  window.location.href = "index.html";
}
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
</head>
<body>

<h2>Login Page</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login(document.getElementById('email').value, document.getElementById('password').value)">Login</button>

<hr>

<h3>Save Links</h3>
<input type="text" id="link1" placeholder="Link 1">
<input type="text" id="link2" placeholder="Link 2">
<button onclick="saveUserLinks()">Save Links</button>

<script type="module">
  // ===== Firebase SDK =====
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  // ===== Firebase Config (Change to YOUR Project Config) =====
  const firebaseConfig = {
    apiKey: "AIzaSyD5mDY4i5INFDTQGE4koBi1oT0PjW8Tbqs",
    authDomain: "link-in-bio-1.firebaseapp.com",
    projectId: "link-in-bio-1",
    storageBucket: "link-in-bio-1.firebasestorage.app",
    messagingSenderId: "490986484338",
    appId: "1:490986484338:web:8b96905764df93f58a08eb"
  };

  // ===== Initialize Firebase =====
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ===== Login Function =====
  async function login(email, password) {
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      alert("Login Successful!");
      console.log("Logged in user:", userCredential.user.uid);
    } catch (e) {
      alert("Login Failed: " + e.message);
      console.error(e);
    }
  }

  // ===== Save User Links =====
  async function saveUserLinks() {
    const user = auth.currentUser;
    if (!user) {
      alert("Please login first!");
      return;
    }

    const links = [
      document.getElementById('link1').value,
      document.getElementById('link2').value
    ];

    try {
      await setDoc(doc(db, "users", user.uid), { links });
      alert("Links saved successfully!");
      console.log("Saved links for user:", user.uid);
    } catch (e) {
      alert("Error saving links: " + e.message);
      console.error(e);
    }
  }

  // ===== Check login state =====
  onAuthStateChanged(auth, (user) => {
    if(user) {
      console.log("User is logged in:", user.uid);
    } else {
      console.log("User is logged out");
    }
  });

</script>

</body>
</html>
